<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f8fb;
        color: #102a43;
      }
      .card {
        width: min(460px, 92vw);
        background: #fff;
        border: 1px solid #d9e2ec;
        border-radius: 14px;
        padding: 20px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.3rem;
      }
      p {
        margin: 0;
        color: #486581;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>You are offline</h1>
      <p>
        The app shell is available, but this specific page could not be loaded.
      </p>
    </section>
  </body>
</html>
